# Best-effort generic OpenOCD config for nRF54L (e.g. Seeed XIAO nRF54L15).
#
# nRF54L is not yet covered by mainline OpenOCD target scripts. This treats the
# application core as a generic Cortex-M33 over SWD: halt / memory / RAM debug
# work; RRAM flash programming may NOT until OpenOCD adds an nRF54L flash driver.
# Pair with an interface cfg, e.g.:
#   OPENOCD_TARGET=openocd/nrf54l.cfg OPENOCD_INTERFACE=interface/cmsis-dap.cfg ./scripts/host-bridge.sh
#
# See ./openocd/README.md for the J-Link / nrfutil flashing fallback.

transport select swd

source [find target/swj-dp.tcl]

set _CHIPNAME nrf54l
set _CPUTAPID 0x6ba02477

swj_newdap $_CHIPNAME cpu -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -dap $_CHIPNAME.dap

# Generous reset handling for SWD-only boards.
reset_config srst_nogate
adapter speed 1000

# No flash bank declared on purpose: avoids a wrong nRF5x flash driver clobbering
# RRAM. Use `load` for RAM debug, or a J-Link/nrfutil runner for flashing.
